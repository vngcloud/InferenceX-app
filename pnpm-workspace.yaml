packages:
  - packages/*

allowBuilds:
  '@posthog/cli': true
  core-js: true
  cypress: true
  esbuild: true
  lefthook: true
  protobufjs: true
  sharp: true

minimumReleaseAge: 1440
minimumReleaseAgeStrict: true

# Security pins for advisories not fixable via pnpm overrides:
# - vite and @babel/core only appear as peer deps (vitest; styled-jsx / babel plugins),
#   and pnpm overrides don't apply to peers, so they are pinned to patched versions as
#   direct devDependencies in the root package.json instead.
# - js-yaml's only patched release (4.x) drops safeLoad/safeDump, which gray-matter
#   (build-time blog frontmatter parsing of our own posts) still calls, so it cannot be
#   upgraded. The advisory is build-time only with trusted input, so it is ignored here.
auditConfig:
  ignoreGhsas:
    - GHSA-h67p-54hq-rp68

overrides:
  postcss@<8.5.10: '>=8.5.10'
  qs@>=6.11.1 <=6.15.1: '>=6.15.2'
