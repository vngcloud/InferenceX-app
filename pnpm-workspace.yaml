packages:
  - packages/*

allowBuilds:
  '@posthog/cli': true
  core-js: true
  cypress: true
  esbuild: true
  lefthook: true
  protobufjs: true
  sharp: true

minimumReleaseAge: 1440
minimumReleaseAgeStrict: true

overrides:
  hono@<4.12.21: '>=4.12.21'
  postcss@<8.5.10: '>=8.5.10'
  qs@>=6.11.1 <=6.15.1: '>=6.15.2'
