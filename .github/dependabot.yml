version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    cooldown:
      default-days: 1
    open-pull-requests-limit: 2
    labels:
      - 'type/dependencies'
    commit-message:
      prefix: 'chore'
    groups:
      all-minor-patch:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'
      all-major:
        patterns:
          - '*'
        update-types:
          - 'major'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    cooldown:
      default-days: 1
    open-pull-requests-limit: 2
    labels:
      - 'type/dependencies'
    commit-message:
      prefix: 'chore'
    groups:
      all-minor-patch:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'
      all-major:
        patterns:
          - '*'
        update-types:
          - 'major'
