name: Cache Refresh

on:
  workflow_dispatch:

jobs:
  refresh:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --filter @semianalysisai/inferencex-app...
        env:
          CYPRESS_INSTALL_BINARY: '0'

      - name: Invalidate cache
        env:
          INVALIDATE_SECRET: ${{ secrets.VERCEL_INVALIDATE_SECRET }}
        run: pnpm admin:cache:invalidate https://inferencex.semianalysis.com

      - name: Warm up cache
        run: pnpm admin:cache:warmup https://inferencex.semianalysis.com
