name: Cache Refresh

on:
  workflow_dispatch:

jobs:
  refresh:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --filter @semianalysisai/inferencex-app...
        env:
          CYPRESS_INSTALL_BINARY: '0'

      - name: Invalidate cache
        env:
          INVALIDATE_SECRET: ${{ secrets.VERCEL_INVALIDATE_SECRET }}
        run: pnpm admin:cache:invalidate https://inferencex.semianalysis.com

      - name: Warm up cache
        run: pnpm admin:cache:warmup https://inferencex.semianalysis.com
